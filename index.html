<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Třídní Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #111827;
            margin: 0;
            padding: 2rem;
        }

        /* Čistá hlavička s počítadlem */
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .counter {
            font-size: 0.875rem;
            color: #6b7280;
        }

        /* Kontejner pro přesně 16 studentů (mřížka) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Minimalistická kartička */
        .zak-karta {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.2s;
        }

        /* Když žák vyrušuje, kartička získá jen jemný červený obrys */
        .zak-karta.vytrus {
            border-color: #f87171;
            background-color: #fef2f2;
        }

        /* Hlavička kartičky s tečkou stavu */
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .status-dot.ok {
            background-color: #10b981;
        }

        .status-dot.vytrus {
            background-color: #ef4444;
        }

        .zak-jmeno {
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .zak-url {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 16px;
            /* Zarovnání pod text jména */
        }

        /* Čisté "ghost" tlačítko */
        .btn-varovat {
            background: transparent;
            border: 1px solid #d1d5db;
            color: #374151;
            padding: 0.35rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-varovat:hover {
            background: #f3f4f6;
        }

        /* Tlačítko zčervená jen tehdy, když žák vyrušuje */
        .zak-karta.vytrus .btn-varovat {
            border-color: #fca5a5;
            color: #991b1b;
            background: #fee2e2;
        }

        .zak-karta.vytrus .btn-varovat:hover {
            background: #fecaca;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #9ca3af;
            font-size: 0.875rem;
            padding: 2rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Třídní Radar</h1>
        <div class="counter" id="pocetZaku">Připojeno: 0</div>
    </header>

    <div class="grid-container" id="seznamZaku">
        <div class="empty-state">Čekám na připojení žáků...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const seznam = document.getElementById('seznamZaku');
        const pocetElement = document.getElementById('pocetZaku');
        const zaci = {};

        const zakazaneWeby = ['youtube.com', 'facebook.com', 'poki.com', 'instagram.com', 'tiktok.com'];

        socket.on('aktualizacePanelu', (data) => {
            if (Object.keys(zaci).length === 0) seznam.innerHTML = '';

            let jeMimo = zakazaneWeby.some(web => data.url.includes(web));
            let statusTrida = jeMimo ? 'vytrus' : 'ok';

            zaci[data.email] = `
                <div class="zak-karta ${statusTrida}">
                    <div>
                        <div class="card-header">
                            <span class="status-dot ${statusTrida}"></span>
                            <span class="zak-jmeno">${data.email}</span>
                        </div>
                        <div class="zak-url" title="${data.url}">${data.url}</div>
                    </div>
                    <button class="btn-varovat" onclick="posliVarovani(event, '${data.email}')">
                        Varovat
                    </button>
                </div>
            `;

            seznam.innerHTML = Object.values(zaci).join('');
            pocetElement.innerText = `Připojeno: ${Object.keys(zaci).length}`;
        });

        function posliVarovani(event, email) {
            fetch('/api/poslat-varovani', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            let btn = event.currentTarget;
            let originalText = btn.innerHTML;

            btn.innerHTML = 'Odesláno ✓';
            btn.style.borderColor = '#10b981';
            btn.style.color = '#10b981';
            btn.style.background = 'transparent';

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style = ''; // Vrátí styly do původního stavu
            }, 2000);
        }
    </script>
</body>

</html>
