<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Třídní Radar - Učitel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --warning-hover: #d97706;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Moderní hlavička s přechodem */
        header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        #seznamZaku {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Animovaný text při čekání */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* Kartička žáka */
        .zak-karta {
            background: var(--card-bg);
            padding: 1.2rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e5e7eb;
        }

        .zak-karta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .student-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            /* aby fungovalo useknutí dlouhého textu */
        }

        .zak-jmeno {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .zak-url {
            color: var(--text-muted);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Štítky stavu */
        .status {
            padding: 6px 16px;
            border-radius: 9999px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ok {
            background-color: var(--success);
        }

        .vytrus {
            background-color: var(--danger);
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* Vylepšené tlačítko Varovat */
        .btn-varovat {
            background-color: var(--warning);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.3);
            min-width: 120px;
            justify-content: center;
        }

        .btn-varovat:hover {
            background-color: var(--warning-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(245, 158, 11, 0.4);
        }

        .btn-varovat:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <header>
        <h1>📡 Třídní Radar</h1>
        <p style="margin-top: 5px; opacity: 0.9;">Přehled o aktivitě studentů v reálném čase</p>
    </header>

    <div class="container">
        <div id="seznamZaku">
            <div class="empty-state">
                ⏳ Čekám na připojení žáků...
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const seznam = document.getElementById('seznamZaku');
        const zaci = {};

        const zakazaneWeby = ['youtube.com', 'facebook.com', 'poki.com', 'instagram.com', 'tiktok.com'];

        socket.on('aktualizacePanelu', (data) => {
            if (Object.keys(zaci).length === 0) seznam.innerHTML = '';

            let jeMimo = zakazaneWeby.some(web => data.url.includes(web));
            let statusTrida = jeMimo ? 'vytrus' : 'ok';
            let statusText = jeMimo ? '⚠️ Vyrušuje' : '✅ Pracuje';

            zaci[data.email] = `
                <div class="zak-karta">
                    <div class="student-info">
                        <span class="zak-jmeno">${data.email}</span>
                        <span class="zak-url">${data.url}</span>
                    </div>
                    <div class="controls">
                        <span class="status ${statusTrida}">${statusText}</span>
                        <button class="btn-varovat" onclick="posliVarovani(event, '${data.email}')">
                            <span>🔔</span> Varovat
                        </button>
                    </div>
                </div>
            `;

            seznam.innerHTML = Object.values(zaci).join('');
        });

        // Moderní odeslání bez vyskakovacího alert okna
        function posliVarovani(event, email) {
            fetch('/api/poslat-varovani', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            // Animace tlačítka pro potvrzení (zezelená a změní text)
            let btn = event.currentTarget;
            let originalText = btn.innerHTML;
            let originalColor = btn.style.backgroundColor;

            btn.innerHTML = '✔️ Odesláno';
            btn.style.backgroundColor = '#10b981'; // Zelená

            // Po 2 vteřinách se vrátí zpět
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = originalColor;
            }, 2000);
        }
    </script>
</body>

</html>
